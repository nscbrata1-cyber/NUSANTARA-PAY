<!doctype html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NUSANTARA PAY V4</title>
<style>
body{margin:0;font-family:Arial;background:#eef4ff}
.app{max-width:430px;margin:auto;background:#fff;min-height:100vh;padding-bottom:90px}
.header{background:linear-gradient(135deg,#007bff,#5ec2ff);padding:28px;color:#fff;border-radius:0 0 35px 35px}
.balance{background:#fff;color:#111;padding:18px;border-radius:24px;margin-top:20px}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding:20px}
.btn{background:#f4f7ff;border:none;border-radius:22px;padding:14px;font-size:16px}
.section{padding:20px}
.card,.profile{background:#f5f7fc;padding:15px;border-radius:18px;margin-top:10px}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);max-width:430px;width:100%;background:#fff;border-top:1px solid #ddd;display:flex;justify-content:space-around;padding:12px 0}
</style>
</head>
<body>
<div class="app">
<div class="header">
<h1>NUSANTARA PAY</h1>
<p>Dompet Digital Nusantara</p>
<div class="balance"><p>Saldo Anda</p><h1 id="saldo">Rp1.250.000</h1></div>
</div>

<div class="grid">
<button class="btn" onclick="kirim()">💸<br>Kirim</button>
<button class="btn" onclick="topup()">➕<br>Top Up</button>
<button class="btn" onclick="qr()">📷<br>QR</button>
<button class="btn" onclick="lihatRiwayat()">📜<br>Riwayat</button>
</div>

<div class="section">
<h2>Profil</h2>
<div class="profile">👤 Dewa Putu<br>📱 08xxxxxxxxxx<br>🏦 Premium Member</div>

<h2>Transaksi Terbaru</h2>
<div id="history"></div>
</div>

<div class="nav">
<div>🏠<br>Home</div>
<div>💳<br>Wallet</div>
<div>🔔<br>Notif</div>
<div>👤<br>Profil</div>
</div>
</div>

<script>
let saldo = Number(localStorage.getItem('saldo')) || 1250000;
let riwayatData = JSON.parse(localStorage.getItem('riwayat')) || [];

function rp(n){ return 'Rp' + n.toLocaleString('id-ID'); }

function updateUI(){
 document.getElementById('saldo').innerText = rp(saldo);
 let h = document.getElementById('history');
 h.innerHTML = '';
 riwayatData.slice().reverse().forEach(x=>{
   h.innerHTML += `<div class="card">${x}</div>`;
 });
 localStorage.setItem('saldo', saldo);
 localStorage.setItem('riwayat', JSON.stringify(riwayatData));
}

function topup(){
 let n = parseInt(prompt('Nominal Top Up (10000/50000/100000/500000)'));
 if(n){
  saldo += n;
  riwayatData.push('➕ Top Up ' + rp(n));
  updateUI();
  alert('Top Up berhasil ✅');
 }
}

function kirim(){
 let nama = prompt('Kirim ke siapa?');
 let n = parseInt(prompt('Nominal transfer'));
 if(n && n <= saldo){
  saldo -= n;
  riwayatData.push('💸 Transfer ke '+nama+' - '+rp(n));
  updateUI();
  alert('Transfer berhasil ✅');
 } else {
  alert('Saldo tidak cukup ❌');
 }
}

function qr(){ alert('📷 QR PAY DEMO'); }
function lihatRiwayat(){ alert('Riwayat ada di bawah 👇'); }

updateUI();
</script>
</body>
</html>
