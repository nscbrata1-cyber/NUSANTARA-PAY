<!doctype html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NUSANTARA PAY V3</title>
<style>
body{margin:0;font-family:Arial;background:#eef4ff}
.app{max-width:430px;margin:auto;background:#fff;min-height:100vh;padding-bottom:90px}
.header{background:linear-gradient(135deg,#007bff,#5bbcff);padding:28px;color:#fff;border-radius:0 0 35px 35px}
.balance{background:#fff;color:#111;padding:18px;border-radius:24px;margin-top:20px}
.balance h1{margin:8px 0}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding:20px}
.btn{background:#f4f7ff;border:none;border-radius:22px;padding:14px;font-size:18px;cursor:pointer}
.btn:active{transform:scale(0.95)}
.section{padding:20px}
.card{background:#f5f7fc;padding:15px;border-radius:18px;margin-top:10px}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);max-width:430px;width:100%;background:#fff;border-top:1px solid #ddd;display:flex;justify-content:space-around;padding:12px 0}
</style>
</head>
<body>
<div class="app">
<div class="header">
<h1>NUSANTARA PAY</h1>
<p>Dompet Digital Nusantara</p>
<div class="balance">
<p>Saldo Anda</p>
<h1 id="saldo">Rp1.250.000</h1>
</div>
</div>

<div class="grid">
<button class="btn" onclick="kirim()">💸<br>Kirim</button>
<button class="btn" onclick="topup()">➕<br>Top Up</button>
<button class="btn" onclick="qr()">📷<br>QR</button>
<button class="btn" onclick="riwayat()">📜<br>Riwayat</button>
</div>

<div class="section">
<h2>Transaksi Terbaru</h2>
<div id="history"></div>
</div>

<div class="nav">
<div>🏠<br>Home</div>
<div>💳<br>Wallet</div>
<div>🔔<br>Notif</div>
<div>👤<br>Profil</div>
</div>
</div>

<script>
let saldo = Number(localStorage.getItem('saldo')) || 1250000;
let riwayatData = JSON.parse(localStorage.getItem('riwayat')) || [];

function formatRupiah(num){
 return 'Rp' + num.toLocaleString('id-ID');
}

function updateUI(){
 document.getElementById('saldo').innerText = formatRupiah(saldo);
 const h = document.getElementById('history');
 h.innerHTML = '';
 riwayatData.slice().reverse().forEach(item=>{
   h.innerHTML += `<div class="card">${item}</div>`;
 });
 localStorage.setItem('saldo', saldo);
 localStorage.setItem('riwayat', JSON.stringify(riwayatData));
}

function topup(){
 let amount = prompt('Masukkan nominal top up');
 if(amount){
   saldo += parseInt(amount);
   riwayatData.push('+ ' + formatRupiah(parseInt(amount)) + ' Top Up');
   updateUI();
   alert('Top Up berhasil!');
 }
}

function kirim(){
 let amount = prompt('Masukkan nominal kirim');
 amount = parseInt(amount);
 if(amount && amount <= saldo){
   saldo -= amount;
   riwayatData.push('- ' + formatRupiah(amount) + ' Transfer');
   updateUI();
   alert('Transfer berhasil!');
 } else {
   alert('Saldo tidak cukup!');
 }
}

function qr(){
 alert('📷 QR PAY DEMO');
}

function riwayat(){
 alert('Riwayat tersimpan di bawah');
}

updateUI();
</script>
</body>
</html>
