<!doctype html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>NUSANTARA PAY V7.3 FIX</title>
<style>
body{margin:0;font-family:Arial;background:#eef4ff}
.container{max-width:430px;margin:auto;background:#fff;min-height:100vh;padding:20px;box-sizing:border-box}
.hidden{display:none}
h1,h2,h3{margin:10px 0}
input,button{
width:100%;padding:14px;margin:8px 0;
border-radius:12px;border:1px solid #ddd;box-sizing:border-box;
font-size:16px
}
button{background:#007bff;color:white;border:none}
.card{background:#f4f7ff;padding:14px;border-radius:18px;margin-top:10px}
.header{
background:linear-gradient(135deg,#007bff,#66c8ff);
padding:20px;border-radius:0 0 25px 25px;color:white
}
.small{font-size:12px;color:#666}
</style>
</head>
<body>

<div class="container" id="authPage">
<h1>NUSANTARA PAY</h1>

<button onclick="openRegister()">📝 Daftar</button>
<button onclick="openLogin()">🔑 Login</button>

<div id="registerBox" class="hidden">
<h2>Daftar Akun</h2>
<input id="regNama" placeholder="Nama Lengkap">
<input id="regKtp" placeholder="NIK / KTP">
<input id="regAlamat" placeholder="Alamat">
<input id="regHp" placeholder="Nomor HP">
<input id="regPin" type="password" placeholder="PIN 6 digit">
<input id="regPin2" type="password" placeholder="Konfirmasi PIN">
<button onclick="registerUser()">Daftar Sekarang</button>
</div>

<div id="loginBox" class="hidden">
<h2>Login</h2>
<input id="loginHp" placeholder="Nomor HP">
<input id="loginPin" type="password" placeholder="PIN">
<button onclick="loginUser()">Masuk</button>
</div>
</div>

<div class="container hidden" id="dashboardPage">
<div class="header">
<h2>NUSANTARA PAY</h2>
<p id="halo"></p>
<h1 id="saldoText">Rp0</h1>
</div>

<div id="notif" class="card">🔔 Tidak ada notifikasi</div>

<div id="profil" class="card"></div>

<button onclick="topup()">➕ Top Up</button>
<button onclick="transfer()">💸 Transfer</button>
<button onclick="logout()">🚪 Logout</button>

<h3>Riwayat Transaksi</h3>
<div id="history"></div>
</div>

<script>
let users = JSON.parse(localStorage.getItem('users') || '[]');
let currentUser = JSON.parse(localStorage.getItem('currentUser') || 'null');

function saveUsers(){
 localStorage.setItem('users', JSON.stringify(users));
}

function now(){
 return new Date().toLocaleString('id-ID');
}

function openRegister(){
 document.getElementById('registerBox').classList.remove('hidden');
 document.getElementById('loginBox').classList.add('hidden');
}

function openLogin(){
 document.getElementById('loginBox').classList.remove('hidden');
 document.getElementById('registerBox').classList.add('hidden');
}

function registerUser(){
 const nama=document.getElementById('regNama').value.trim();
 const ktp=document.getElementById('regKtp').value.trim();
 const alamat=document.getElementById('regAlamat').value.trim();
 const hp=document.getElementById('regHp').value.trim();
 const pin=document.getElementById('regPin').value;
 const pin2=document.getElementById('regPin2').value;

 if(!nama||!ktp||!alamat||!hp||!pin||!pin2){
  alert('Isi semua data!');
  return;
 }

 if(pin!==pin2){
  alert('PIN tidak sama');
  return;
 }

 if(users.find(u=>u.hp===hp)){
  alert('Nomor HP sudah terdaftar');
  return;
 }

 users.push({
  nama,ktp,alamat,hp,pin,
  saldo:1250000,
  history:[],
  notif:''
 });

 saveUsers();
 alert('Daftar berhasil! Silakan login');
 openLogin();
}

function loginUser(){
 const hp=document.getElementById('loginHp').value.trim();
 const pin=document.getElementById('loginPin').value;

 const user = users.find(u=>u.hp===hp && u.pin===pin);

 if(!user){
  alert('Login gagal');
  return;
 }

 currentUser = user;
 localStorage.setItem('currentUser', JSON.stringify(currentUser));
 renderDashboard();
}

function renderDashboard(){
 document.getElementById('authPage').classList.add('hidden');
 document.getElementById('dashboardPage').classList.remove('hidden');

 document.getElementById('halo').innerText='Halo, '+currentUser.nama;
 document.getElementById('saldoText').innerText=
 'Rp'+currentUser.saldo.toLocaleString('id-ID');

 document.getElementById('profil').innerHTML=
 '👤 '+currentUser.nama+'<br>'+
 '🪪 '+currentUser.ktp+'<br>'+
 '🏠 '+currentUser.alamat+'<br>'+
 '📱 '+currentUser.hp;

 document.getElementById('notif').innerHTML=
 currentUser.notif || '🔔 Tidak ada notifikasi';

 const history=document.getElementById('history');
 history.innerHTML='';

 currentUser.history.slice().reverse().forEach(item=>{
  history.innerHTML += '<div class="card">'+item+'</div>';
 });
}

function syncCurrent(){
 const idx=users.findIndex(u=>u.hp===currentUser.hp);
 users[idx]=currentUser;
 saveUsers();
 localStorage.setItem('currentUser', JSON.stringify(currentUser));
 renderDashboard();
}

function topup(){
 const nominal=parseInt(prompt('Nominal top up'));
 if(!nominal||nominal<=0)return;

 currentUser.saldo += nominal;
 currentUser.history.push(
 '➕ Top Up Rp'+nominal.toLocaleString('id-ID')+
 '<br><span class="small">🕒 '+now()+'</span>'
 );

 syncCurrent();
 alert('Top Up berhasil');
}

function transfer(){
 const hpTujuan=prompt('Nomor HP tujuan');
 const nominal=parseInt(prompt('Nominal transfer'));

 const penerima=users.find(u=>u.hp===hpTujuan);

 if(!penerima){
  alert('Penerima tidak ditemukan');
  return;
 }

 if(!nominal||nominal<=0){
  alert('Nominal salah');
  return;
 }

 if(nominal>currentUser.saldo){
  alert('Saldo tidak cukup');
  return;
 }

 currentUser.saldo -= nominal;
 penerima.saldo += nominal;

 const waktu=now();

 currentUser.history.push(
 '💸 Transfer ke '+penerima.nama+
 '<br>Rp'+nominal.toLocaleString('id-ID')+
 '<br><span class="small">🕒 '+waktu+'</span>'
 );

 penerima.history.push(
 '💰 Diterima dari '+currentUser.nama+
 '<br>Rp'+nominal.toLocaleString('id-ID')+
 '<br><span class="small">🕒 '+waktu+'</span>'
 );

 penerima.notif =
 '🔔 Transfer masuk dari '+currentUser.nama+
 ' Rp'+nominal.toLocaleString('id-ID');

 users[users.findIndex(u=>u.hp===penerima.hp)] = penerima;

 syncCurrent();

 alert('Transfer berhasil');
}

function logout(){
 localStorage.removeItem('currentUser');
 location.reload();
}

if(currentUser){
 renderDashboard();
}
</script>
</body>
</html>
