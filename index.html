<!doctype html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NUSANTARA PAY V6</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial;background:#eef4ff}
.hidden{display:none}
.fade{animation:fade .4s ease}
@keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

.screen{max-width:430px;margin:auto;background:#fff;min-height:100vh}
.splash,.login{
height:100vh;display:flex;flex-direction:column;
justify-content:center;align-items:center;text-align:center;padding:20px
}
.logo{font-size:34px;font-weight:bold;color:#007bff}
.subtitle{opacity:.7}
input,button{
padding:14px;border-radius:16px;border:1px solid #ddd;
width:100%;max-width:320px;margin-top:10px
}
button{background:#007bff;color:white;border:none;font-weight:bold}
.header{
background:linear-gradient(135deg,#007bff,#65c7ff);
padding:28px;color:#fff;border-radius:0 0 35px 35px
}
.balance{
background:#fff;color:#111;padding:18px;border-radius:24px;margin-top:18px
}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:20px}
.card,.profile{
background:#f5f7fc;padding:15px;border-radius:18px;margin:10px 20px
}
.nav{
position:fixed;bottom:0;left:50%;transform:translateX(-50%);
max-width:430px;width:100%;background:#fff;border-top:1px solid #ddd;
display:flex;justify-content:space-around;padding:12px 0
}
.small{font-size:12px}
</style>
</head>
<body>

<div id="splash" class="splash fade">
<div class="logo">NUSANTARA PAY</div>
<p class="subtitle">Dompet Digital Nusantara</p>
</div>

<div id="login" class="login hidden fade">
<h1>🔐 Login</h1>
<p>Masukkan PIN Anda</p>
<input id="pin" type="password" maxlength="6" placeholder="PIN (123456)">
<button onclick="login()">Masuk</button>
</div>

<div id="app" class="screen hidden fade">
<div class="header">
<h1>NUSANTARA PAY</h1>
<div class="balance">
<p>Saldo Anda</p>
<h1 id="saldo">Rp1.250.000</h1>
</div>
</div>

<div class="grid">
<button onclick="kirim()">💸<br><span class="small">Kirim</span></button>
<button onclick="topup()">➕<br><span class="small">Top Up</span></button>
<button onclick="qr()">📷<br><span class="small">QR</span></button>
<button onclick="toggleDark()">🌙<br><span class="small">Dark</span></button>
</div>

<div class="profile">
👤 <span id="nama">Dewa Putu</span><br>
<button onclick="editNama()">Edit Nama</button>
</div>

<div style="padding:0 20px">
<h3>Riwayat Transaksi</h3>
<div id="history"></div>
</div>

<div class="nav">
<div>🏠<br><span class="small">Home</span></div>
<div>💳<br><span class="small">Wallet</span></div>
<div>🔔<br><span class="small">Notif</span></div>
<div>👤<br><span class="small">Profil</span></div>
</div>
</div>

<script>
let saldo = Number(localStorage.getItem('saldo')) || 1250000;
let riwayat = JSON.parse(localStorage.getItem('riwayat')) || [];
let nama = localStorage.getItem('nama') || 'Dewa Putu';

setTimeout(()=>{
 document.getElementById('splash').classList.add('hidden');
 document.getElementById('login').classList.remove('hidden');
},2000);

function rp(n){return 'Rp'+n.toLocaleString('id-ID')}

function update(){
 document.getElementById('saldo').innerText=rp(saldo);
 document.getElementById('nama').innerText=nama;
 const h=document.getElementById('history');
 h.innerHTML='';
 riwayat.slice().reverse().forEach(x=>{
   h.innerHTML += `<div class="card">${x}</div>`;
 });
 localStorage.setItem('saldo',saldo);
 localStorage.setItem('riwayat',JSON.stringify(riwayat));
 localStorage.setItem('nama',nama);
}

function login(){
 let pin=document.getElementById('pin').value;
 if(pin==='123456'){
   document.getElementById('login').classList.add('hidden');
   document.getElementById('app').classList.remove('hidden');
 } else alert('PIN salah ❌');
}

function topup(){
 let n=parseInt(prompt('Nominal top up'));
 if(n){
 saldo += n;
 riwayat.push('➕ Top Up '+rp(n));
 update();
 alert('Top Up berhasil ✅');
 }
}

function kirim(){
 let to=prompt('Kirim ke siapa?');
 let n=parseInt(prompt('Nominal'));
 if(n && n<=saldo){
 saldo -= n;
 riwayat.push('💸 Transfer ke '+to+' - '+rp(n));
 update();
 alert('Transfer berhasil ✅');
 } else alert('Saldo tidak cukup ❌');
}

function qr(){alert('📷 QR PAY DEMO')}
function toggleDark(){document.body.style.background='#111'}
function editNama(){
 nama=prompt('Nama baru',nama)||nama;
 update();
}

update();
</script>
</body>
</html>
